name = "huh"
pages_build_output_dir = "."
compatibility_date = "2025-01-01"
account_id = "070a3601b4467e993a32d044b3fa5cf8"

# KV binding must live here: once a Pages project has pages_build_output_dir
# set, Cloudflare manages bindings via this file, not the dashboard.
# The namespace id below is not a secret (no read/write access without
# separate Cloudflare account credentials), so it's safe to commit.
# Without a binding, functions/api/_facts.js falls back to facts.sample.json
# for local dev.
[[kv_namespaces]]
binding = "FACTS_KV"
id = "70c27bdc9e4f40f886fdde4545902e45"

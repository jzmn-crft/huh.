<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>huh.</title>
  <meta name="description" content="One genuinely surprising, sourced fact a day." />

  <!-- iOS add-to-home-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="huh." />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0B0B0C" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-mesh" aria-hidden="true"><span></span></div>
  <div class="bg-grain" aria-hidden="true"></div>
  <span class="brand mono" aria-hidden="true">huh.</span>
  <main id="app" tabindex="0" aria-live="polite" aria-label="Today's fact. Press space or enter, or click, for another.">
    <div class="meta-row">
      <span id="fact-date" class="mono dim"></span>
    </div>

    <p id="fact-text" class="fact"></p>

    <div class="source-row">
      <a id="fact-source" class="mono dim source-link" href="#" target="_blank" rel="noopener noreferrer"></a>
    </div>

    <span class="disclaimer mono dim">huh. may make mistakes. Always verify with the source.</span>

    <span class="hint mono dim" id="hint">curious? spacebar / click</span>
  </main>

  <script src="/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>daily-fact</title>
  <meta name="description" content="One genuinely surprising, sourced fact a day." />

  <!-- iOS add-to-home-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="daily-fact" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0B0B0C" />

  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main id="app" tabindex="0" aria-live="polite" aria-label="Today's fact. Press space or enter, or click, for another.">
    <div class="meta-row">
      <span id="fact-date" class="mono dim"></span>
    </div>

    <p id="fact-text" class="fact"></p>

    <div class="source-row">
      <a id="fact-source" class="mono dim source-link" href="#" target="_blank" rel="noopener noreferrer"></a>
    </div>

    <span class="hint mono dim">space / click &rarr; another</span>
  </main>

  <script src="/app.js"></script>
</body>
</html>
